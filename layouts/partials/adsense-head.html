{{ if .Site.Params.adsense.publisher_id }}
<!-- Google AdSense Auto Ads -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adsense.publisher_id }}" crossorigin="anonymous"></script>
<script>
  (adsbygoogle = window.adsbygoogle || []).push({
    google_ad_client: "{{ .Site.Params.adsense.publisher_id }}",
    enable_page_level_ads: true
  });
</script>
{{ end }}

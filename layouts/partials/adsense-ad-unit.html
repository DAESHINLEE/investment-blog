{{ if .Site.Params.adsense.publisher_id }}
<div class="adsense-container" style="margin: 30px 0; padding: 10px; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee;">
  <!-- 반응형 광고 단위 -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ .Site.Params.adsense.publisher_id }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>
{{ end }}
